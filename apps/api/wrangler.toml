name = "healthcare-api"
main = "src/index.ts"
# Phase 1.4: bumped to 2024-12-02 because Email Workers (CF Email Routing)
# GA landed in late 2024. nodejs_compat is required for postal-mime.
compatibility_date = "2024-12-02"
compatibility_flags = ["nodejs_compat"]

[alias]
"@healthcare/db" = "../../packages/db/src/index.ts"
"@healthcare/shared" = "../../packages/shared/src/index.ts"
"@healthcare/shared/vitals" = "../../packages/shared/src/vitals.ts"
"@healthcare/shared/records" = "../../packages/shared/src/records.ts"
"@healthcare/shared/validators" = "../../packages/shared/src/validators.ts"
"@healthcare/shared/types" = "../../packages/shared/src/types.ts"

[vars]
# Top-level [vars] = production values. The production worker is deployed
# via `wrangler deploy` (no --env flag) per the current deploy script, so
# this block is what runs at https://healthcare-api.thufailahamed627.workers.dev.
# For local dev, `wrangler dev` reads apps/api/.dev.vars automatically, which
# overrides these values. `wrangler dev --env development` reads [env.development].
ENVIRONMENT = "production"
# Close the JWT-auth bypass (`auth.ts:20` short-circuits when true).
DEV_MODE = "false"
# Portal "Dev Test Login" on the deployed worker (email dev-doctor@healthhub.local,
# password `dev`). Disable before public launch.
ALLOW_DEV_SEED = "true"
# Phase 1.4: domain that hosts personal email aliases, e.g.
# "records.healthhub.app". Used to compose the `<alias>@<EMAIL_ALIAS_DOMAIN>`
# address shown to users. Configure in CF dashboard → Email Routing.
EMAIL_ALIAS_DOMAIN = "records.healthhub.app"
# Phase 2.1: confidence threshold for auto-classification upgrades.
# Reject values below this — recordType stays 'other'.
CLASSIFY_THRESHOLD = "0.6"
CLASSIFY_CRON_THRESHOLD = "0.7"
# Phase 2.3.2: invite landing page. PUBLIC_URL is the web origin where
# recipients without the app installed see the HTML summary. Store URLs
# are placeholders until the app is published.
PUBLIC_URL = "https://app.healthhub.app"
IOS_APP_STORE_URL = "https://apps.apple.com/lk/app/healthhub/id000000000"
ANDROID_PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=app.healthhub.lk"
# Phase 1.3: WhatsApp onboarding. WA_VERIFY_TOKEN and WA_ACCESS_TOKEN are
# secrets — push via `wrangler secret put`. Phone number id is read from
# each webhook payload so it does not need to be configured here.
#
# Phase MVP-2: support channel. Same Meta business number is reused for
# the wa.me deep-link in mobile + marketing surfaces. Operators triage
# onboarding vs support messages from Meta Inbox directly. Digits only,
# no `+` or `wa.me/` prefix.
WA_SUPPORT_PHONE = "94771234567"
# Phase 4: SMS OTP. SMS_PROVIDER controls which gateway is active:
# "smslenz" uses the SMSLenz API; "console" logs to stdout (dev default).
# SMSLENZ_USER_ID and SMSLENZ_API_KEY are set via `wrangler secret put`.
SMS_PROVIDER = "smslenz"
SMS_SENDER_ID = "HealthHub"
# Phase 4: Email OTP. EMAIL_PROVIDER controls the gateway:
#   "cloudflare" -> send via CF Email Workers binding (production, uses EMAIL_ALIAS_DOMAIN)
#   "resend"     -> send via Resend API (set RESEND_API_KEY via wrangler secret)
#   "console"    -> log to stdout (dev default; email body still has the code in dev mode)
EMAIL_PROVIDER = "resend"
EMAIL_FROM = "no-reply@records.healthhub.app"
# Phase 5: PayHere payments. PAYHERE_MERCHANT_ID + PAYHERE_SECRET are set
# via wrangler secret. Sandbox mode uses https://sandbox.payhere.lk.
PAYHERE_SANDBOX = "false"
# Admin passkey relying-party id. In-memory store accepts `localhost`
# fallback but prod passkeys register against the real admin subdomain.
WEBAUTHN_RP_ID = "admin.healthhub.app"

# Day 1: AI safety floor.
# AI_USER_HOURLY_LIMIT caps per-user /ai/* traffic (default 20). Counter
# is global across worker instances via D1 (`ai_counters` table).
# ANTHROPIC_DAILY_CAP caps the expensive Anthropic fallback (default 100).
# AI_FAIL_OPEN=true lets /ai/* bypass the rate limit when D1 is down
# (dev convenience — leave false in prod).
AI_USER_HOURLY_LIMIT = "20"
ANTHROPIC_DAILY_CAP = "100"
AI_FAIL_OPEN = "false"

# Round 2 P0: TOTP MFA for doctors (HIPAA compliance floor).
# MFA_SECRET_KEK is a 32-byte base64 secret used to AES-256-GCM-wrap
# each doctor's TOTP secret. Generate with:
#   openssl rand -base64 32
# Set via `wrangler secret put MFA_SECRET_KEK`.
#
# MFA_RECOVERY_PEPPER is a non-secret salt that strengthens recovery
# code hashes (see lib/mfa.ts). Same `wrangler secret put` workflow.
# Without these two env vars, /mfa routes return 503.

[[d1_databases]]
binding = "DB"
database_name = "healthcare-db"
database_id = "1e38b1d5-9e17-4744-b909-b61c1b631691"

[[r2_buckets]]
binding = "R2"
bucket_name = "healthcare-files"

[ai]
binding = "AI"

[env.development]
# Local-dev overrides. Use with `wrangler dev --env development` for a
# fully-isolated dev environment that uses console gateways, PayHere
# sandbox, and DEV_MODE=true (JWT-auth bypass). For most local work,
# just `wrangler dev` is fine — apps/api/.dev.vars auto-overrides.
ENVIRONMENT = "development"
DEV_MODE = "true"
EMAIL_PROVIDER = "console"
PAYHERE_SANDBOX = "true"
SMS_SENDER_ID = "SMSlenzDEMO"

# Cron triggers (UTC clock - wrangler runs in UTC).
# Runs every 5 minutes and routes tasks based on the system clock:
#   - Dose reminders: run every 5 minutes
#   - Booking reminders + post-visit summaries: run hourly
#   - Refills + vaccinations: run daily at 03:35 UTC
#   - Reclassify sweep: run daily at 23:30 UTC
# Only uses 1 cron trigger slot to comply with Cloudflare Free account-wide limits.
[triggers]
crons = [
  "*/5 * * * *",
]

[observability.logs]
enabled = false
invocation_logs = true
