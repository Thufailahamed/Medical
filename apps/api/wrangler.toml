name = "healthcare-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[alias]
"@healthcare/db" = "../../packages/db/src/index.ts"
"@healthcare/shared" = "../../packages/shared/src/index.ts"

[vars]
ENVIRONMENT = "development"
DEV_MODE = "false"
# Supabase defaults — placeholders so dev mode boots without `.dev.vars`.
# For production, override via `wrangler secret put SUPABASE_URL`, etc.
SUPABASE_URL = "https://placeholder.supabase.co"
SUPABASE_ANON_KEY = "placeholder"
SUPABASE_SERVICE_ROLE_KEY = "placeholder"

[[d1_databases]]
binding = "DB"
database_name = "healthcare-db"
database_id = "1e38b1d5-9e17-4744-b909-b61c1b631691"

[[r2_buckets]]
binding = "R2"
bucket_name = "healthcare-files"

[ai]
binding = "AI"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development", DEV_MODE = "true" }
