name = "healthcare-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[alias]
"@healthcare/db" = "../../packages/db/src/index.ts"
"@healthcare/shared" = "../../packages/shared/src/index.ts"

[vars]
ENVIRONMENT = "development"
DEV_MODE = "false"

[[d1_databases]]
binding = "DB"
database_name = "healthcare-db"
database_id = "1e38b1d5-9e17-4744-b909-b61c1b631691"

[[r2_buckets]]
binding = "R2"
bucket_name = "healthcare-files"

[ai]
binding = "AI"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development", DEV_MODE = "true" }

# Cron triggers:
#   - "7 * * * *"        → booking reminders (hourly at :07, off-minute)
#   - "3,8,13,...,58 * * * *" → dose reminders (every 5 min, off-minute).
#     Off-minute shifts (3,8,13,18,23,28,33,38,43,48,53,58) avoid the
#     :00/:05 spike seen by other jobs worldwide.
[triggers]
crons = ["7 * * * *", "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"]
