name = "healthcare-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[alias]
"@healthcare/db" = "../../packages/db/src/index.ts"
"@healthcare/shared" = "../../packages/shared/src/index.ts"

[vars]
ENVIRONMENT = "development"
DEV_MODE = "false"

[[d1_databases]]
binding = "DB"
database_name = "healthcare-db"
database_id = "1e38b1d5-9e17-4744-b909-b61c1b631691"

[[r2_buckets]]
binding = "R2"
bucket_name = "healthcare-files"

[ai]
binding = "AI"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development", DEV_MODE = "true" }

# Cron triggers — fires every hour at :07 to remind patients/doctors
# of appointments scheduled in the next 24 hours.
# Off-minute (:07) avoids the :00 spike seen by other cron jobs.
[triggers]
crons = ["7 * * * *"]
