name = "healthcare-api"
main = "src/index.ts"
# Phase 1.4: bumped to 2024-12-02 because Email Workers (CF Email Routing)
# GA landed in late 2024. nodejs_compat is required for postal-mime.
compatibility_date = "2024-12-02"
compatibility_flags = ["nodejs_compat"]

[alias]
"@healthcare/db" = "../../packages/db/src/index.ts"
"@healthcare/shared" = "../../packages/shared/src/index.ts"
"@healthcare/shared/vitals" = "../../packages/shared/src/vitals.ts"
"@healthcare/shared/records" = "../../packages/shared/src/records.ts"
"@healthcare/shared/validators" = "../../packages/shared/src/validators.ts"
"@healthcare/shared/types" = "../../packages/shared/src/types.ts"

[vars]
ENVIRONMENT = "development"
DEV_MODE = "true"
# Phase 1.4: domain that hosts personal email aliases, e.g.
# "records.healthhub.app". Used to compose the `<alias>@<EMAIL_ALIAS_DOMAIN>`
# address shown to users. Configure in CF dashboard → Email Routing.
EMAIL_ALIAS_DOMAIN = "records.healthhub.app"
# Phase 2.1: confidence threshold for auto-classification upgrades.
# Reject values below this — recordType stays 'other'.
CLASSIFY_THRESHOLD = "0.6"
CLASSIFY_CRON_THRESHOLD = "0.7"
# Phase 2.3.2: invite landing page. PUBLIC_URL is the web origin where
# recipients without the app installed see the HTML summary. Store URLs
# are placeholders until the app is published.
PUBLIC_URL = "https://app.healthhub.app"
IOS_APP_STORE_URL = "https://apps.apple.com/app/id000000000"
ANDROID_PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=app.healthhub"
# Phase 1.3: WhatsApp onboarding. Set WA_VERIFY_TOKEN to whatever you
# pasted into the Meta dashboard's webhook "verify token" field. Set
# WA_ACCESS_TOKEN to a system-user token with whatsapp_business_messaging
# scope. Phone number id is read from each webhook payload so it does
# not need to be configured here.
WA_VERIFY_TOKEN = "wa-verify-token-set-via-secret"
# Phase 4: SMS OTP. SMS_PROVIDER controls which gateway is active:
# "smslenz" uses the SMSLenz API; "console" logs to stdout (dev default).
# SMSLENZ_USER_ID and SMSLENZ_API_KEY are set via `wrangler secret put`.
SMS_PROVIDER = "smslenz"
SMS_SENDER_ID = "SMSlenzDEMO"
# Phase 4: Email OTP. EMAIL_PROVIDER controls the gateway:
#   "cloudflare" -> send via CF Email Workers binding (production, uses EMAIL_ALIAS_DOMAIN)
#   "resend"     -> send via Resend API (set RESEND_API_KEY via wrangler secret)
#   "console"    -> log to stdout (dev default; email body still has the code in dev mode)
EMAIL_PROVIDER = "console"
EMAIL_FROM = "no-reply@records.healthhub.app"
# Phase 5: PayHere payments. PAYHERE_MERCHANT_ID + PAYHERE_SECRET are set
# via wrangler secret. Sandbox mode uses https://sandbox.payhere.lk.
PAYHERE_SANDBOX = "true"

# Round 2 P0: TOTP MFA for doctors (HIPAA compliance floor).
# MFA_SECRET_KEK is a 32-byte base64 secret used to AES-256-GCM-wrap
# each doctor's TOTP secret. Generate with:
#   openssl rand -base64 32
# Set via `wrangler secret put MFA_SECRET_KEK`.
#
# MFA_RECOVERY_PEPPER is a non-secret salt that strengthens recovery
# code hashes (see lib/mfa.ts). Same `wrangler secret put` workflow.
# Without these two env vars, /mfa routes return 503.

[[d1_databases]]
binding = "DB"
database_name = "healthcare-db"
database_id = "1e38b1d5-9e17-4744-b909-b61c1b631691"

[[r2_buckets]]
binding = "R2"
bucket_name = "healthcare-files"

[ai]
binding = "AI"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development", DEV_MODE = "true" }

# Cron triggers (UTC clock - wrangler runs in UTC).
#   "7 * * * *"                                  -> booking reminders (hourly :07 UTC)
#   "3,8,13,18,23,28,33,38,43,48,53,58 * * * *" -> dose reminders (every 5 min)
#   "37 3 * * *"                                  -> refill reminders (daily 09:07 SL = 03:37 UTC)
#   "30 23 * * *"                                 -> reclassify sweep (daily 05:00 SL = 23:30 UTC, Phase 2.1)
#   "42 3 * * *"                                  -> vaccination reminders (daily 09:12 SL = 03:42 UTC, Phase 2.2)
# Off-minute shifts avoid the :00/:05 spike seen by other cron jobs.
[triggers]
crons = [
  "3,8,13,18,23,28,33,38,43,48,53,58 * * * *",
  "7 * * * *",
  "37 3 * * *",
  "30 23 * * *",
  "42 3 * * *",
]

[observability.logs]
enabled = false
invocation_logs = true
